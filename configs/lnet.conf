# ============================================================================
# LNet configuration — pin Lustre networking to the InfiniBand interface
# Path: /etc/modprobe.d/lnet.conf
#
# Without this pin, after a reboot LNet may bind to the wrong NIC (e.g. eno1).
# tcp0(ibs2) forces the single tcp NID onto ibs2 (IPoIB, 192.168.200.x).
# ============================================================================

options lnet networks="tcp0(ibs2)"
