# ============================================================================
# Slurm configuration — HPC cluster
# Path: /etc/slurm/slurm.conf  (distributed to nodes via Warewulf overlay)
#
# SANITIZED TEMPLATE. Sync the MUNGE key separately (do NOT commit munge.key).
# ============================================================================

ClusterName=onprem-hpc
SlurmctldHost=master(192.168.100.10)

# --- Authentication / process tracking ---
AuthType=auth/munge
ProctrackType=proctrack/cgroup
TaskPlugin=task/affinity,task/cgroup

# --- Scheduling ---
SchedulerType=sched/backfill
SelectType=select/cons_tres
SelectTypeParameters=CR_Core

# --- MPI ---
MpiDefault=pmix

# --- Logging / state ---
SlurmctldPidFile=/var/run/slurmctld.pid
SlurmdPidFile=/var/run/slurmd.pid
SlurmctldLogFile=/var/log/slurmctld.log
SlurmdLogFile=/var/log/slurmd.log
StateSaveLocation=/var/spool/slurm/ctld
SlurmdSpoolDir=/var/spool/slurm/d
SlurmUser=slurm

# --- Silence cosmetic warnings (optional) ---
MailProg=/bin/true
JobAcctGatherType=jobacct_gather/none

# --- Nodes ---
# Adjust CPUs/Sockets/Cores/RealMemory to your hardware (see: slurmd -C).
NodeName=compute CPUs=1 State=UNKNOWN
NodeName=master  CPUs=1 State=UNKNOWN   # master doubles as an execution node

# --- Partitions ---
PartitionName=normal Nodes=compute,master Default=YES MaxTime=INFINITE State=UP
