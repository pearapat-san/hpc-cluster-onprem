# ============================================================================
# Warewulf 4 configuration — HPC cluster master (provisioner)
# Path on the master node: /etc/warewulf/warewulf.conf
#
# SANITIZED TEMPLATE. Replace values with your real ones and re-run:
#   wwctl configure --all
# ============================================================================

# Provisioning interface = private switch (eno2). NOT InfiniBand.
ipaddr: 192.168.100.10
netmask: 255.255.255.0
network: 192.168.100.0

warewulf:
  port: 9873
  secure: false
  update interval: 60
  autobuild overlays: true
  # Legacy BIOS hardware: chainload BIOS iPXE (undionly.kpxe), not UEFI-only.
  grubboot: false

dhcp:
  enabled: true
  template: default
  range start: 192.168.100.50
  range end: 192.168.100.99
  systemd name: dhcpd

tftp:
  enabled: true
  systemd name: tftp

nfs:
  enabled: false
